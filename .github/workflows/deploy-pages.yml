name: Refresh data and deploy dashboard

on:
  push:
    branches: [master]
  schedule:
    # Daily refresh of live Reed/Adzuna listings (06:10 UTC).
    - cron: "10 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh jobs.json from live sources
        # The pipeline tolerates individual source failures (recorded in
        # source_runs); if the whole step fails the deploy still ships the
        # committed jobs.json snapshot rather than breaking.
        continue-on-error: true
        env:
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          pip install pytest
          python -m pytest -q
          python -m pipeline.build_jobs \
            --source-adapter reed:live \
            --source-adapter adzuna:live \
            --results 50 \
            --sponsor-register data/sponsor_register/sponsors.csv \
            --output frontend/public/jobs.json \
            --min-jobs 1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run frontend tests
        run: npm test -- --run
        working-directory: frontend
      - name: Build with Pages base path
        run: npm run build -- --base=/visajobfinder/
        working-directory: frontend
      - name: Add SPA fallback so /check resolves on Pages
        run: cp frontend/dist/index.html frontend/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
